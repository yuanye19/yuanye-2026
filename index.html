<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUANYE 2026</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  margin:40px 24px;
  background:#fff;
  color:#111;
}

:root{
  --blue:#0B3D91;
  --green:#0B6E4F;
  --red:#8B1E3F;
}

.logo{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:40px;
}
.logo-img{ width:120px; margin-bottom:10px; }
.logo-text{ font-size:14px; letter-spacing:4px; }

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:50px;
}
.slogan{
  font-size:28px;
  line-height:1.2;
  text-transform:uppercase;
}
.clock{text-align:right;}
.time{
  background:#000;
  color:#fff;
  font-size:32px;
  padding:8px 14px;
}
.date{ font-size:12px; margin-top:6px; }

.section{ margin-bottom:60px; }
.section h2{
  font-size:14px;
  border-bottom:1px solid #000;
  padding-bottom:6px;
  margin-bottom:12px;
}

.goal-blue{ color:var(--blue); }
.goal-green{ color:var(--green); }
.goal-red{ color:var(--red); }

textarea{
  width:100%;
  border:none;
  border-bottom:1px solid #eee;
  resize:none;
  outline:none;
  margin-bottom:8px;
  font-size:12px;
  background:transparent;
}

.month{ margin-bottom:50px; }
.month-content{ display:none; margin-top:15px; }
.month.active .month-content{ display:block; }

.week{
  margin-bottom:20px;
  padding-bottom:12px;
  border-bottom:1px solid #eee;
}

.week-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.week-title{
  font-size:11px;
  font-weight:600;
  letter-spacing:1px;
}

.week-progress{
  font-size:11px;
  opacity:0.6;
}

.day-row{
  display:grid;
  grid-template-columns:1fr repeat(3,22px);
  gap:6px;
  align-items:center;
  font-size:12px;
  margin-bottom:4px;
}

.day-left{
  display:flex;
  justify-content:space-between;
}

.day-date{ opacity:0.5; }

input[type="checkbox"]{
  width:18px;
  height:18px;
  appearance:none;
  border:1px solid #ccc;
  cursor:pointer;
}

.cb-blue:checked{ background:var(--blue); border-color:var(--blue); }
.cb-green:checked{ background:var(--green); border-color:var(--green); }
.cb-red:checked{ background:var(--red); border-color:var(--red); }

@media screen and (max-width:768px){
  .slogan{ font-size:16px !important; }
  .time{ font-size:16px !important; padding:4px 8px !important; }
  .date{ font-size:9px !important; }
  .logo-img{ width:80px !important; }
}
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png" class="logo-img">
  <div class="logo-text">YUANYE</div>
</div>

<div class="header">
  <div class="slogan">
    TAKE RISK,<br>DON'T REGRET.
  </div>
  <div class="clock">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>
</div>

<div class="section">
  <h2>YEAR GOALS (3)</h2>
  <textarea class="goal-blue" data-key="year1"></textarea>
  <textarea class="goal-green" data-key="year2"></textarea>
  <textarea class="goal-red" data-key="year3"></textarea>
</div>

<div id="container"></div>

<script>

/* ===== SUPABASE CONFIG ===== */
const supabaseUrl="https://cbktbimwqilzhanxthln.supabase.co";
const supabaseKey="sb_publishable_O1Wv4Qg9GO19JFD2Veu49A_-6sQBDpm";
const supabaseClient=window.supabase.createClient(supabaseUrl,supabaseKey);

/* ===== SAFE SAVE ===== */
async function saveToCloud(key,value){
  if(value === undefined || value === null) return;

  const cleanValue = String(value);

  await supabaseClient
    .from("entries")
    .upsert(
      { key: key, value: cleanValue },
      { onConflict: "key" }
    );
}

document.addEventListener("input",e=>{
  if(e.target.dataset.key){
    saveToCloud(e.target.dataset.key,e.target.value);
  }
});

document.addEventListener("change",e=>{
  if(e.target.dataset.key){
    saveToCloud(e.target.dataset.key,e.target.checked);
  }
});

/* ===== LOAD ===== */
async function loadAll(){
  const {data,error}=await supabaseClient
    .from("entries")
    .select("*");

  if(error) return;

  data.forEach(row=>{
    if(!row.key) return;

    const el=document.querySelector(`[data-key="${row.key}"]`);
    if(!el) return;

    if(el.type==="checkbox"){
      el.checked = row.value === "true";
    }else{
      if(row.value !== "undefined"){
        el.value = row.value;
      }
    }
  });

  recalcAllWeeks();
}

/* ===== CLOCK ===== */
function updateClock(){
  const now=new Date();
  document.getElementById("time").innerText=
    now.toTimeString().split(" ")[0];
  document.getElementById("date").innerText=
    now.toLocaleDateString("en-US",
      {weekday:"short",year:"numeric",month:"short",day:"numeric"});
}
setInterval(updateClock,1000);
updateClock();

/* ===== GENERATE ===== */
const container=document.getElementById("container");

for(let m=2;m<12;m++){

  const monthDiv=document.createElement("div");
  monthDiv.className="month";

  const monthName=new Date(2026,m)
    .toLocaleString("en-US",{month:"long",year:"numeric"});

  monthDiv.innerHTML=`
    <h2 onclick="this.parentElement.classList.toggle('active')">
      ${monthName}
    </h2>
    <div class="month-content">
      <div class="section">
        <h2>MONTH FOCUS (3)</h2>
        <textarea class="goal-blue" data-key="m${m}_1"></textarea>
        <textarea class="goal-green" data-key="m${m}_2"></textarea>
        <textarea class="goal-red" data-key="m${m}_3"></textarea>
      </div>
    </div>
  `;

  const content=monthDiv.querySelector(".month-content");
  const daysInMonth=new Date(2026,m+1,0).getDate();

  let weekCount=1;
  let weekDiv=createWeek(m,weekCount);
  content.appendChild(weekDiv);

  for(let d=1; d<=daysInMonth; d++){

    const dateObj=new Date(2026,m,d);
    const weekday=dateObj.getDay();

    if(d!==1 && weekday===0){
      weekCount++;
      weekDiv=createWeek(m,weekCount);
      content.appendChild(weekDiv);
    }

    const dayName=dateObj.toLocaleString("en-US",{weekday:"short"});
    const dateText=dateObj.toLocaleDateString("en-US",
      {month:"2-digit",day:"2-digit"});

    const row=document.createElement("div");
    row.className="day-row";
    row.innerHTML=`
      <div class="day-left">
        <span>${dayName}</span>
        <span class="day-date">${dateText}</span>
      </div>
      <input type="checkbox" class="cb-blue" data-key="m${m}w${weekCount}d${d}a">
      <input type="checkbox" class="cb-green" data-key="m${m}w${weekCount}d${d}b">
      <input type="checkbox" class="cb-red" data-key="m${m}w${weekCount}d${d}c">
    `;
    weekDiv.appendChild(row);
  }

  container.appendChild(monthDiv);
}

function createWeek(m,num){
  const week=document.createElement("div");
  week.className="week";

  week.innerHTML=`
    <div class="week-header">
      <div class="week-title">WEEK ${num}</div>
      <div class="week-progress">0%</div>
    </div>
    <textarea class="goal-blue" data-key="m${m}w${num}_1"></textarea>
    <textarea class="goal-green" data-key="m${m}w${num}_2"></textarea>
    <textarea class="goal-red" data-key="m${m}w${num}_3"></textarea>
  `;

  week.addEventListener("change",updateProgress);
  return week;
}

/* ===== PROGRESS ===== */
function updateProgress(e){
  const week=e.currentTarget;
  const boxes=week.querySelectorAll('input[type="checkbox"]');
  const checked=week.querySelectorAll('input[type="checkbox"]:checked');

  if(boxes.length===0) return;

  const percent=Math.round((checked.length/boxes.length)*100);
  week.querySelector(".week-progress").innerText=percent+"%";
}

function recalcAllWeeks(){
  document.querySelectorAll(".week").forEach(week=>{
    const boxes=week.querySelectorAll('input[type="checkbox"]');
    const checked=week.querySelectorAll('input[type="checkbox"]:checked');
    if(boxes.length===0) return;
    const percent=Math.round((checked.length/boxes.length)*100);
    week.querySelector(".week-progress").innerText=percent+"%";
  });
}

loadAll();

</script>
</body>
</html>
