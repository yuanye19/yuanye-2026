<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUANYE 2026</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  margin:40px 24px;
  background:#fff;
  color:#111;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:50px;
}
.year{
  font-size:28px;
  font-weight:500;
  line-height:1.2;
  text-transform:uppercase;
}
.time{
  background:#000;
  color:#fff;
  font-size:32px;
  padding:8px 14px;
}
.date{
  font-size:12px;
  margin-top:6px;
}

/* MONTH */
.month{ margin-bottom:50px; }
.month-content{ display:none; margin-top:20px; }
.month.active .month-content{ display:block; }

.week{
  margin-bottom:25px;
  padding-bottom:10px;
  border-bottom:1px solid #eee;
}

.week-title{
  font-size:11px;
  margin-bottom:8px;
  letter-spacing:1px;
}

.day-row{
  display:grid;
  grid-template-columns:1fr repeat(3,20px);
  gap:6px;
  align-items:center;
  font-size:12px;
  margin-bottom:4px;
}

.day-left{
  display:flex;
  justify-content:space-between;
}

.day-date{ opacity:0.5; }

input[type="checkbox"]{
  width:16px;
  height:16px;
}

/* MOBILE */
@media screen and (max-width:768px){
  .year{ font-size:16px !important; }
  .time{ font-size:16px !important; padding:4px 8px !important; }
  .date{ font-size:9px !important; }
}
</style>
</head>

<body>

<div class="header">
  <div class="year">
    TAKE RISK,<br>DON'T REGRET.
  </div>
  <div>
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>
</div>

<div id="container"></div>

<script>

/* CLOCK */
function updateClock(){
  const now=new Date();
  document.getElementById("time").innerText=
    now.toTimeString().split(" ")[0];
  document.getElementById("date").innerText=
    now.toLocaleDateString("en-US",
      {weekday:"short",year:"numeric",month:"short",day:"numeric"});
}
setInterval(updateClock,1000);
updateClock();

/* GENERATE 2026 FROM MARCH 1 */
const container=document.getElementById("container");

for(let m=2;m<12;m++){   // 2 = March

  const monthDiv=document.createElement("div");
  monthDiv.className="month";

  const monthName=new Date(2026,m)
    .toLocaleString("en-US",{month:"long",year:"numeric"});

  monthDiv.innerHTML=`
    <h2 onclick="this.parentElement.classList.toggle('active')">
      ${monthName}
    </h2>
    <div class="month-content"></div>
  `;

  const content=monthDiv.querySelector(".month-content");
  const daysInMonth=new Date(2026,m+1,0).getDate();

  let weekCount=1;
  let weekDiv=document.createElement("div");
  weekDiv.className="week";
  weekDiv.innerHTML=`<div class="week-title">WEEK ${weekCount}</div>`;
  content.appendChild(weekDiv);

  for(let d=1; d<=daysInMonth; d++){

    const dateObj=new Date(2026,m,d);
    const weekday=dateObj.getDay(); // Sunday=0

    if(d!==1 && weekday===0){
      weekCount++;
      weekDiv=document.createElement("div");
      weekDiv.className="week";
      weekDiv.innerHTML=`<div class="week-title">WEEK ${weekCount}</div>`;
      content.appendChild(weekDiv);
    }

    const dayName=dateObj.toLocaleString("en-US",{weekday:"short"});
    const dateText=dateObj.toLocaleDateString("en-US",
      {month:"2-digit",day:"2-digit"});

    weekDiv.innerHTML+=`
      <div class="day-row">
        <div class="day-left">
          <span>${dayName}</span>
          <span class="day-date">${dateText}</span>
        </div>
        <input type="checkbox">
        <input type="checkbox">
        <input type="checkbox">
      </div>
    `;
  }

  container.appendChild(monthDiv);
}

</script>
</body>
</html>
